apiVersion: apps/v1
kind: Deployment
metadata:
  name: configmap-secret-test
  labels:
    app: configmap-secret-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: configmap-secret-test
  template:
    metadata:
      labels:
        app: configmap-secret-test
    spec:
      containers:
      - name: nginx
        image: docker.io/nginxinc/nginx-unprivileged:1.25
        ports:
        - containerPort: 8080
        # ConfigMap values as environment variables
        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: APP_ENV
        - name: APP_DEBUG
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: APP_DEBUG
        # Secret values as environment variables
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: API_KEY
        # ConfigMap as a mounted file
        volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx/conf.d
        # Secret as a mounted file
        - name: secret-volume
          mountPath: /etc/secrets
          readOnly: true
      volumes:
      - name: config-volume
        configMap:
          name: app-config
          items:
          - key: nginx.conf
            path: default.conf
      - name: secret-volume
        secret:
          secretName: app-secret
