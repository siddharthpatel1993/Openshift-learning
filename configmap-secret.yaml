apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  APP_ENV: "production"
  APP_DEBUG: "false"
  nginx.conf: |
    server {
      listen 8080;
      location / {
        return 200 'ConfigMap works!\n';
        add_header Content-Type text/plain;
      }
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  DB_PASSWORD: "myS3cretP@ss"
  API_KEY: "abc123-secret-key"
